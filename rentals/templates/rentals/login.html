{% extends 'rentals/base.html' %}
{% load i18n %}

{% block title %}{% trans "تسجيل الدخول" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">{% trans "تسجيل الدخول" %}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">{% trans "اسم المستخدم" %}</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{% trans "كلمة المرور" %}</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">{% trans "دخول" %}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
